# docker-compose.example.yml
# Shows how to run the auto-pull watcher alongside your application.
# Copy this, fill in the env vars, and mount your actual compose file.

services:
  # Your application — example only
  app:
    image: your-registry/your-repo:latest
    restart: unless-stopped

  # container-auto-updater watcher
  container-auto-updater:
    image: ghcr.io/omaraboulmakarem/container-auto-updater:latest
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /path/to/your/docker-compose.yml:/compose/docker-compose.yml:ro
      # Optional: mount your app's .env if your compose file uses required variables
      # - /path/to/your/.env:/compose/.env:ro
      - auto_updater_docker_config:/root/.docker
    environment:
      WATCH_IMAGES: "your-registry/your-repo:latest"
      COMPOSE_FILE: "/compose/docker-compose.yml"
      # Optional: mount your app's .env and set this so compose can interpolate required variables
      # COMPOSE_ENV_FILE: "/compose/.env"
      # Name of this watcher service in the compose file — excluded from pull/up to avoid self-conflict
      CA_UPDATER_SERVICE_NAME: "container-auto-updater"
      # Optional: override the auto-detected compose project name
      # CA_UPDATER_COMPOSE_PROJECT_NAME: "my-project"
      CA_UPDATER_PROJECT_NAME: "my-app"
      CHECK_INTERVAL_MINUTES: "5"
      SKIP_FIRST_RUN: "true"
      SENDGRID_API_KEY: "${SENDGRID_API_KEY}"
      EMAIL_FROM: "alerts@yourdomain.com"
      EMAIL_TO: "ops@yourdomain.com,oncall@yourdomain.com"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AWS_REGION: "us-east-1"
      OCIR_USERNAME: "${OCIR_USERNAME}"
      OCIR_AUTH_TOKEN: "${OCIR_AUTH_TOKEN}"
      DOCKERHUB_USERNAME: "${DOCKERHUB_USERNAME}"
      DOCKERHUB_TOKEN: "${DOCKERHUB_TOKEN}"

volumes:
  auto_updater_docker_config:
    driver: local
