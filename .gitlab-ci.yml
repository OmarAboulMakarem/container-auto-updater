variables:
  GIT_DEPTH: "0"

  # GitHub Container Registry — secrets kept in GitLab CI/CD variables:
  #   GHCR_USERNAME  (your GitHub username)
  #   GHCR_TOKEN     (GitHub PAT with write:packages scope)
  GHCR_REPO: "ghcr.io/omaraboulmakarem/container-auto-update"

  IMAGE_VERSION: "1.0.${CI_PIPELINE_IID}"

stages:
  - build-image

build-container-auto-update:
  stage: build-image
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - echo "Building ${IMAGE_VERSION}"
    # Build once, tag for both registries
    - >-
      docker build
      -t "${OCI_REPO}:auto-pull-${IMAGE_VERSION}"
      -t "${OCI_REPO}:auto-pull-latest"
      -t "${GHCR_REPO}:${IMAGE_VERSION}"
      -t "${GHCR_REPO}:latest"
      .
    # Push to Oracle OCI
    - echo "$OCI_AUTH_TOKEN" | docker login -u "$OCI_USERNAME" --password-stdin "$OCI_REGISTRY"
    - docker push "${OCI_REPO}:auto-pull-${IMAGE_VERSION}"
    - docker push "${OCI_REPO}:auto-pull-latest"
    - docker logout "$OCI_REGISTRY"
    # Push to GitHub Container Registry
    - echo "$GHCR_TOKEN" | docker login -u "$GHCR_USERNAME" --password-stdin ghcr.io
    - docker push "${GHCR_REPO}:${IMAGE_VERSION}"
    - docker push "${GHCR_REPO}:latest"
    - docker logout ghcr.io
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == 'master'
